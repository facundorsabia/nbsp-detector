<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>

<body>

  <!-- Header: Avatar + Title + Credits -->
  <div class="header">
    <div class="avatar-wrapper">
      <div class="avatar-ring">
        <img src="frs-dev.png" alt="Facundo Rodriguez Sabia">
      </div>
    </div>
    <h1 class="title">VML Nbsp Detector</h1>
    <p class="credits">by Facundo Rodriguez Sabia (VML Front End Dev)</p>
  </div>

  <!-- Decorative Divider with VML logo -->
  <div class="divider">
    <div class="divider-line"></div>
    <img src="logo-vml.png" alt="VML" class="divider-logo">
    <div class="divider-line"></div>
  </div>

  <!-- Estado Section -->
  <div class="section">
    <p class="section-title">Estado</p>
    <div class="status-row">
      <div class="status-indicators">
        <div id="indicatorOn" class="status-indicator inactive">
          <span class="status-dot teal"></span>
          <span class="label-on">Encendido</span>
        </div>
        <div id="indicatorOff" class="status-indicator active">
          <span class="status-dot pink"></span>
          <span class="label-off">Apa<strong>gado</strong></span>
        </div>
      </div>
      <label class="switch">
        <input type="checkbox" id="statusCheckbox">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- Resaltado Visual Section -->
  <div class="slider-section">
    <p class="section-title">Resaltado Visual</p>
    <div class="slider-container">
      <input type="range" id="highlightSlider" min="0" max="100" value="100">
      <div class="slider-labels">
        <span>0%</span>
        <span>100%</span>
      </div>
    </div>
  </div>

  <!-- Footer: VML Branding -->
  <div class="footer">
    <span class="footer-text">Desarrollado en:</span>
    <img src="logo-vml.png" alt="VML" class="footer-logo">
    <span class="footer-brand">VML</span>
  </div>

  <script src="popup.js"></script>
</body>

</html>
